<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo Avatar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #0b3b75;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    canvas {
      width: 100%;
      max-width: 360px;
      border-radius: 12px;
      background: #ddd;
      margin-top: 15px;
    }

    input, button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    input {
      background: #eef1f5;
    }

    button {
      background: #0b3b75;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #092f5e;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Tạo Avatar</h2>
    <p>Chọn ảnh cá nhân, căn chỉnh rồi tải về.</p>

    <input type="file" id="upload" accept="image/*">

    <canvas id="canvas" width="1080" height="1080"></canvas>

    <button onclick="downloadAvatar()">Tải avatar về máy</button>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const frame = new Image();
    frame.src = "frame.png";

    let userImage = null;

    frame.onload = drawCanvas;

    document.getElementById("upload").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        userImage = new Image();
        userImage.onload = drawCanvas;
        userImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function drawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (userImage) {
        const size = Math.max(canvas.width, canvas.height);
        const ratio = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
        const newWidth = userImage.width * ratio;
        const newHeight = userImage.height * ratio;
        const x = (canvas.width - newWidth) / 2;
        const y = (canvas.height - newHeight) / 2;

        ctx.drawImage(userImage, x, y, newWidth, newHeight);
      } else {
        ctx.fillStyle = "#e5e5e5";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
    }

    function downloadAvatar() {
      const link = document.createElement("a");
      link.download = "avatar.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
